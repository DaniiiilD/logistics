<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Centrifugo Тестовый Клиент</title>
    <script src="https://unpkg.com/centrifuge@5.0.1/dist/centrifuge.js"></script>
</head>
<body style="font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9;">

    <h2 style="color: #2c3e50;">Real-time Панель Компаний</h2>
    
    <div style="margin-bottom: 20px;">
        <label for="companyId" style="font-weight: bold;">Введите ID компании для авторизации на сайте: </label>
        <input type="number" id="companyId" value="6" style="padding: 8px; width: 60px; border-radius: 4px; border: 1px solid #ccc;">
        <button id="connectBtn" style="padding: 8px 15px; background-color: #0984e3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Авторизоваться и слушать
        </button>
    </div>

    <div id="status" style="padding: 10px; border-radius: 5px; background-color: #ffeaa7; display: inline-block;">
        Ожидание ввода ID компании...
    </div>

    <h3 style="margin-top: 30px; color: #34495e;">Лента входящих откликов:</h3>
    <div id="log" style="padding: 20px; background: white; border: 1px solid #dcdde1; border-radius: 8px; min-height: 150px; line-height: 1.6;">
        Авторизуйтесь, чтобы начать прием событий...
    </div>

    <script>
        const centrifuge = new Centrifuge("ws://localhost:8001/connection/websocket");
        let activeSubscription = null;

        document.getElementById("connectBtn").addEventListener("click", function() {
            const companyId = document.getElementById("companyId").value;
            if (!companyId) return alert("Введите ID компании!");

            // Если уже была активная подписка на другую компанию, отписываемся от нее
            if (activeSubscription) {
                activeSubscription.unsubscribe();
            }

            const channelName = `company_orders_${companyId}`;
            
            // Создаем новую динамическую подписку на выбранную компанию!
            activeSubscription = centrifuge.newSubscription(channelName);

            activeSubscription.on("publication", function(ctx) {
                const logDiv = document.getElementById("log");
                const messageHtml = `
                    <div style="border-bottom: 1px solid #f1f2f6; padding: 10px 0;">
                        <b>🆕 Новый отклик на ваш заказ №${ctx.data.order_id}!</b><br>
                        Водитель: <span style="color: #0984e3;">${ctx.data.driver_name}</span> | 
                        Транспорт: <span style="color: #2ecc71;">${ctx.data.transport_type}</span>
                    </div>
                `;
                
                if (logDiv.innerHTML.includes("Авторизуйтесь") || logDiv.innerHTML.includes("Ожидание событий...")) {
                    logDiv.innerHTML = messageHtml;
                } else {
                    logDiv.innerHTML = messageHtml + logDiv.innerHTML;
                }
            });

            activeSubscription.subscribe();
            
            const statusDiv = document.getElementById("status");
            statusDiv.innerHTML = `🟢 Слушаем канал: company_orders_${companyId}`;
            statusDiv.style.backgroundColor = "#2ecc71";
            statusDiv.style.color = "white";
            
            document.getElementById("log").innerHTML = "Ожидание событий...";
        });

        centrifuge.connect();
    </script>
</body>
</html>
